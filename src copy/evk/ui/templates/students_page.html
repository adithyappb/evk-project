{% extends "base.html" %}
{% block title %}EVK · Students{% endblock %}
{% block content %}

<section class="rounded-[2rem] border border-slate-200 bg-gradient-to-br from-white via-white to-slate-50 px-6 py-7 shadow-sm">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div class="max-w-2xl">
      <a href="{{ request.url_for('admin_dashboard') }}" class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-slate-950">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Back to dashboard
      </a>
      <div class="mt-5 inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-100 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-700">
        Recipients
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl">Students</h1>
      <p class="mt-3 text-sm leading-6 text-slate-600 sm:text-base">A clean roster of opted-in recipients, each with a direct email action.</p>
    </div>
    <div class="rounded-3xl border border-slate-200 bg-white px-5 py-4 text-right shadow-sm">
      <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500">Total students</div>
      <div class="mt-2 text-3xl font-semibold tracking-tight text-slate-950 tabular-nums">{{ stats.students }}</div>
    </div>
  </div>
</section>

<div class="mt-6">
  {% include "_students_panel.html" %}
</div>

{% endblock %}
