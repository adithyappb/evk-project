{% if drafts %}
<ul class="space-y-3 fade-in">
  {% for d in drafts %}
    {% include "_draft_row.html" %}
  {% endfor %}
</ul>
{% else %}
<div class="rounded-2xl border border-dashed border-slate-800 bg-slate-900/30 p-14 text-center fade-in">
  <div class="mx-auto h-10 w-10 rounded-full bg-slate-800 grid place-items-center">
    <svg class="h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <div class="mt-4 text-sm text-slate-200 font-medium">Nothing {{ active_status.replace('_', ' ') }}</div>
  <div class="text-xs text-slate-500 mt-1">
    Try <kbd class="mx-1 px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-[10px] text-slate-300">S</kbd> to simulate a newsletter.
  </div>
</div>
{% endif %}
