{% if drafts %}
<ul class="space-y-3 fade-in">
  {% for d in drafts %}
    {% include "_draft_row.html" %}
  {% endfor %}
</ul>
{% else %}
<div class="rounded-2xl border border-dashed border-slate-200 bg-slate-50 p-14 text-center fade-in">
  <div class="mx-auto grid h-10 w-10 place-items-center rounded-full bg-white shadow-sm ring-1 ring-slate-200">
    <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <div class="mt-4 text-sm font-medium text-slate-800">Nothing {{ active_status.replace('_', ' ') }}</div>
  <div class="mt-1 text-xs text-slate-500">This queue is clear right now.</div>
</div>
{% endif %}
