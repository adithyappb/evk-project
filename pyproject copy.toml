[project]
name = "evk"
version = "0.1.0"
description = "EVK: ingest newsletters, classify with Gemini, personalize for students, and distribute approved opportunities via Inkbox."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "EVK" }]
license = { text = "MIT" }
dependencies = [
    # Removed inkbox to replace with native Gmail API
    "google-genai>=1.0.0",
    "google-cloud-firestore>=2.19.0",
    "fastapi[standard]>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic[email]>=2.9.0",
    "pydantic-settings>=2.6.0",
    "httpx>=0.27.0",
    "loguru>=0.7.2",
    "apscheduler>=3.10.4",
    "tenacity>=9.0.0",
    "python-multipart>=0.0.12",
    "typer>=0.13.0",
    "rich>=13.9.0",
    "jinja2>=3.1.4",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
]

[project.scripts]
evk = "evk.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
# Required to allow the `inkbox @ git+https://...` direct reference in deps.
allow-direct-references = true

[tool.uv]
# `copy` instead of `hardlink` avoids Windows ERROR_CLOUD_FILE_INCOMPATIBLE_HARDLINKS
# when the project sits on a OneDrive-synced path. No effect on Linux/macOS.
link-mode = "copy"

[tool.hatch.build.targets.wheel]
packages = ["src/evk"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's Depends(...) default-arg pattern is idiomatic.
"src/evk/api.py" = ["B008"]
"src/evk/ui/routes.py" = ["B008"]
# Tests deliberately assert on Exception subclasses for brevity.
"tests/*.py" = ["B017"]

[tool.mypy]
strict = true
python_version = "3.11"
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
